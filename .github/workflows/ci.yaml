name: CI Pipeline


on:
  push:
    branches:
        - main
  pull_request:
    branches:
        - main

env:
  NODE_VERSION: '24.18.0'
  PNPM_VERSION: '10.8.0'

jobs:
    
   test-and-build:
     name: Run Tests
     runs-on: ubuntu-latest

     services:
       postgres:
         image: postgres:16-alpine
         env:
           POSTGRES_USER: taskuser
           POSTGRES_PASSWORD: taskpassword
           POSTGRES_DB: taskdb
         ports:
           - 5432:5432
         options: >-
           --health-cmd pg_isready
           --health-interval 5s
           --health-timeout 5s
           --health-retries 5

     steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm migrate
        env:
          DATABASE_URL: postgresql://taskuser:taskpassword@localhost:5432/taskdb

      - name: Run lint
        run: pnpm lint

      - name: Run build (typecheck)
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:unit:ci --coverage
        env:
          DATABASE_URL: postgresql://taskuser:taskpassword@localhost:5432/taskdb
          JWT_SECRET: test-secret-for-ci

      - name: Run integration tests
        run: pnpm test:integration:ci --coverage
        continue-on-error: true     # remove this later
        env:
          DATABASE_URL: postgresql://taskuser:taskpassword@localhost:5432/taskdb
          JWT_SECRET: test-secret-for-ci
          PORT: 3000

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/


   security-scan:
      name: Security Scan
      runs-on: ubuntu-latest
      needs: test-and-build
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: auto

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run SCA (dependency audit)
        run: pnpm audit --audit-level=critical

      - name: Build Docker image
        run: docker build -t taskmanager:${{ github.sha }} .

      - name: Run Trivy (container vulnerability scan)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true     # remove this later
        with:
          image-ref: taskmanager:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag image for Docker Hub
        run: |
          docker tag taskmanager:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager:${{ github.sha }}
          docker tag taskmanager:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager:latest

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskmanager:latest

   dast-scan:
    name: DAST Scan
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t taskmanager:${{ github.sha }} .

      - name: Start app + database for DAST
        run: |
          docker network create dast-net
          docker run -d --name dast-postgres --network dast-net \
            -e POSTGRES_USER=taskuser -e POSTGRES_PASSWORD=taskpassword -e POSTGRES_DB=taskdb \
            postgres:16-alpine
          sleep 10
          docker run -d --name dast-app --network dast-net -p 3000:3000 \
            -e DATABASE_URL="postgresql://taskuser:taskpassword@dast-postgres:5432/taskdb" \
            -e JWT_SECRET="test-secret-for-dast" \
            -e PORT=3000 \
            taskmanager:${{ github.sha }}
          sleep 10

      - name: Run OWASP ZAP (DAST)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: false    # does not block the pipeline even if the findings reported.
          allow_issue_writing: false
          artifact_name: 'zap-scan-report'

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

      - name: Tear down DAST containers
        if: always()
        run: |
          docker rm -f dast-app dast-postgres
          docker network rm dast-net
