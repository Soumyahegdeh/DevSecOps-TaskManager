apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmanager
  namespace: taskmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskmanager
  template:
    metadata:
      labels:
        app: taskmanager
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: taskmanager
          image: soumyahe/taskmanager:dc0f8447629df1558bf20ce8005fbb9797879ff2
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                   name: taskmanager-secrets
                   key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                   name: taskmanager-secrets
                   key: JWT_SECRET